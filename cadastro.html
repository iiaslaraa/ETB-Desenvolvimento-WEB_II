<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Candidato — SGC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a href="index.html"><img src="logo-SGC-2.1.png" alt="Logo do Site" class="logo"></a>
  </header>

  <nav>
    <a href="index.html">Início</a>
    <a href="listar_candidatos.php">Listar Candidatos</a>
    <a href="sobre.html">
      Sobre o SGC
    </a>
  </nav>

  <main>
    <div class="container">
      <h2>Cadastro de Candidato</h2>

      <!--
        action: envia os dados para salvar_candidato.php
        method="post": dados enviados no corpo da requisição
        (mais seguro que GET para dados pessoais)
      -->
      <form action="salvar_candidato.php"
            method="post">
                    <!-- Campo: Nome completo -->
        <div class="form-group">
          <label for="nome">Nome Completo:</label>
          <!-- required: validação nativa do HTML5 -->
          <input type="text" id="nome"
                 name="nome"
                 placeholder="Ex: João da Silva"
                 required>
        </div>

        <!-- Campo: E-mail -->
        <div class="form-group">
          <label for="email">E-mail:</label>
          <!-- type="email": valida formato de e-mail -->
          <input type="email" id="email"
                 name="email"
                 placeholder="Ex: joao@email.com"
                 required>
        </div>

        <!-- Campo: Telefone -->
        <div class="form-group">
          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone"
                 name="telefone"
                 placeholder="Ex: (11) 99999-9999">
        </div>

        <!-- Campo: Objetivo profissional -->
        <div class="form-group">
          <label for="objetivo">Objetivo:</label>
          <!-- textarea: campo de texto multilinha -->
          <textarea id="objetivo" name="objetivo"
            placeholder="Descreva seu objetivo profissional..."
          ></textarea>
        </div>

        <!-- Campo: Formação acadêmica -->
        <div class="form-group">
          <label for="formacao">Formação:</label>
          <textarea id="formacao" name="formacao"
            placeholder="Ex: Técnico em TI — IFSP (2024)"
          ></textarea>
        </div>

        <!-- Campo: Experiência profissional -->
        <div class="form-group">
          <label for="experiencia">Experiência:</label>
          <textarea id="experiencia"
                    name="experiencia"
            placeholder="Descreva suas experiências..."
          ></textarea>
        </div>

        <!-- Campo: Habilidades -->
        <div class="form-group">
          <label for="habilidades">Habilidades:</label>
          <textarea id="habilidades"
                    name="habilidades"
            placeholder="Ex: PHP, MySQL, HTML, CSS..."
          ></textarea>
        </div>

        <!-- Botões de ação -->
        <button type="submit"
                class="btn btn-success">
          Salvar Candidato
        </button>
        <a href="index.html"
           class="btn btn-danger">
          Cancelar
        </a>

      </form>
    </div>
  </main>

  <!-- RODAPÉ -->
<footer>
    <!-- Utiliza o script abaixo para buscar o ano atual -->
    <p>&copy; <span id="anoAtual"></span> — SGC — PEAR Sistemas de Informação S.A.
  </br>
    Todos os direitos reservados.</p>

<script>
    //busca o ano atual com a função Date()
    document.getElementById("anoAtual").innerHTML = new Date().getFullYear();
</script>

</footer>

</body>
</html>
